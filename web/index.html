<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Restaurant management for Katiya Station — tables, orders, kitchen, billing and inventory.">
  <meta name="theme-color" content="#C0392B">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Katiya Station">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon. The .ico carries 16/24/32/48 variants for the browser to pick
       from; the .png is the modern fallback. Both show the gold ring and the
       katiya pots — the wordmark is cropped out because it turns to mush
       below ~64px. -->
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png"/>

  <title>Katiya Station RMS</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Passkeys Web SDK (required by supabase_flutter / gotrue transitive dependency) -->
  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js" type="application/javascript"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
