name: katiya_station_rms
description: Katiya Station Restaurant & Bar - Complete Restaurant Management System
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Clean web URLs (path strategy — removes the # from the address bar)
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP Client (replaces Supabase client)
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # WebSocket / Realtime 
  socket_io_client: ^3.0.1

  # Firebase (FCM Push Notifications)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Offline Database (Isar) — NATIVE ONLY.
  # Isar 3.x is a native-first engine: isar_generator emits 64-bit schema-hash
  # literals (e.g. 7675659480273757682) that dart2js cannot represent, and there
  # is no Isar web backend. So Isar is never imported from the web entrypoint —
  # it lives behind offline_store_io.dart (conditional import in offline_store.dart),
  # while Flutter Web uses the SharedPreferences-backed offline_store_web.dart.
  # Bumping these versions does NOT make the generated code web-safe; do not try.
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Secure Token Storage
  flutter_secure_storage: ^9.2.2

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  gap: ^3.0.1

  # Premium Design Libraries
  pluto_grid: ^8.0.0
  skeletonizer: ^2.1.3
  lottie: ^3.3.0
  responsive_framework: ^1.5.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.3

  # File & Excel
  excel: ^4.0.6
  file_picker: ^8.0.7
  path_provider: ^2.1.3

  # Printing (ESC/POS)
  flutter_pos_printer_platform_image_3: ^1.2.3
  esc_pos_utils_plus: ^2.0.4

  # JSON Serialization
  json_annotation: ^4.9.0
  pdf: ^3.11.3
  printing: ^5.14.3
  file_saver: ^0.3.1

  # Looping alarm on the kitchen screen when a KOT goes unaccepted.
  # Pinned, not caret: CI and Vercel build on Flutter 3.32.0 (see vercel.json
  # and .github/workflows/flutter-web.yml), and audioplayers 6.7.0+ requires
  # Flutter >=3.35.0. 6.6.0 is the newest release that still builds there.
  # Raise this only together with the pinned Flutter version.
  audioplayers: 6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/sounds/
