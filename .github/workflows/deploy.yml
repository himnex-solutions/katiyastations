name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

# Never let two deploys run at once: a second push mid-deploy would git-reset
# and rebuild underneath the first. Queue them instead of overlapping.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Application
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: katiyarms
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 15m
          script: |
            set -eo pipefail

            cd ~/katiyastation/katiyastations/backend

            echo "===== Updating Code ====="
            git fetch origin
            git reset --hard origin/main

            echo "===== Installing Dependencies ====="
            npm ci

            echo "===== Generating Prisma Client ====="
            npx prisma generate

            echo "===== Building Backend ====="
            npm run build

            echo "===== Running Prisma Migrations ====="
            npx prisma migrate deploy

            echo "===== Starting / Reloading PM2 ====="
            pm2 startOrReload ecosystem.config.js --update-env

            echo "===== Health Check ====="
            # Give Nest a moment to bind the port, then confirm it actually
            # answers. Any HTTP status means it is up and routing; 000 means the
            # process died on boot — fail the deploy loudly and show the logs so
            # a crash-looping build can never be reported as a green deploy.
            sleep 6
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 5 \
              http://localhost:3000/api/v1/branches || echo 000)
            if [ "$code" = "000" ]; then
              echo "API did not respond on :3000 after reload"
              pm2 logs katiya-api --lines 60 --nostream || true
              exit 1
            fi
            echo "API responded (HTTP $code)"

            # Only freeze the process list once we know it is healthy, so a
            # broken deploy is never the state that gets resurrected on reboot.
            echo "===== Saving PM2 ====="
            pm2 save

            echo "===== Deployment Completed Successfully ====="
